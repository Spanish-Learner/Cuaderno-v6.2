name: Build Android APK

# Runs automatically on every push to main, and can also be triggered manually
# from the "Actions" tab on GitHub ("Run workflow" button).
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Unzip the project
        run: unzip -o project.zip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java (needed by Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install web app dependencies
        working-directory: project
        run: npm install

      - name: Build the web app
        working-directory: project
        run: npm run build

      - name: Add the Android platform (Capacitor)
        working-directory: project
        run: npx cap add android

      - name: Sync web build into the Android project
        working-directory: project
        run: npx cap sync android

      - name: Build the debug APK
        working-directory: project/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: cuaderno-debug-apk
          path: project/android/app/build/outputs/apk/debug/app-debug.apk
